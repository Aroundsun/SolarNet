name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        build_type: [Debug, Release]
        compiler: [gcc, clang]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ clang clang-tidy libgtest-dev libbenchmark-dev

      - name: 配置 CMake
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            export CC=clang
            export CXX=clang++
          else
            export CC=gcc
            export CXX=g++
          fi
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DSOLAR_NET_BUILD_TESTS=ON \
            -DSOLAR_NET_BUILD_BENCHMARKS=ON \
            -DSOLAR_NET_BUILD_EXAMPLES=ON \
            -DSOLAR_NET_USE_CLANG_TIDY=ON

      - name: 构建
        run: cmake --build build --parallel

      - name: 运行测试
        run: ctest --test-dir build --output-on-failure --parallel

      - name: 运行基准测试
        run: ./build/benchmarks/bench_version --benchmark_min_time=0.1s
